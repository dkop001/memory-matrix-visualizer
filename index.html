<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Code Execution Visualizer | Memory Matrix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <span class="glow-text">MEMORY</span> MATRIX
            </div>
            <div class="controls">
                <button id="run-btn" class="primary-btn">RUN CODE</button>
                <button id="stop-btn" class="secondary-btn" style="border-color: #ff4d4d; color: #ff4d4d;">STOP</button>
                <button id="reset-btn" class="secondary-btn">RESET</button>
            </div>
        </header>

        <main>
            <div id="editor-pane">
                <div class="pane-header">SOURCE CODE</div>
                <div id="monaco-container"></div>
            </div>

            <div id="visualizer-pane">
                <div class="pane-header">3D MEMORY STATE</div>
                <div id="three-container"></div>
                
                <div id="timeline-overlay">
                    <div class="timeline-info">
                        <span id="current-step">Step: 0</span>
                        <span id="total-steps">/ 0</span>
                    </div>
                    <input type="range" id="timeline-slider" min="0" max="0" value="0">
                    <div class="action-display" id="action-text">Ready...</div>
                </div>
            </div>
        </main>

        <div id="status-bar">
            <span id="status-text">System Idle</span>
            <span id="worker-status">Worker: Ready</span>
        </div>

        <div id="debug-log" style="position: fixed; top: 10px; right: 10px; width: 300px; height: 200px; background: rgba(0,0,0,0.8); color: #00ff00; font-family: monospace; font-size: 10px; overflow-y: auto; padding: 10px; border: 1px solid #333; z-index: 1000; pointer-events: none; display: none;">
            <div>DEBUG LOG:</div>
        </div>
    </div>

    <!-- Core Dependencies -->
    <script>
        // Emergency Babel Protection: Prevent Monaco/AMD from hijacking Babel
        window.__define = window.define;
        window.define = undefined;
    </script>
    
    <script id="babel-script" src="babel.min.js?v=1.0.1" onerror="console.warn('Local Babel failed, using CDN fallback'); var s = document.createElement('script'); s.src='https://unpkg.com/@babel/standalone/babel.min.js'; document.head.appendChild(s);"></script>
    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script src="gsap.min.js"></script>

    <script>
        // Restore define for Monaco
        window.define = window.__define;
        
        var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.nls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.js"></script>

    <!-- Project Scripts -->
    <script src="instrumenter.js"></script>
    <script src="visualizer.js"></script>
    <script src="main.js"></script>
</body>
</html>
